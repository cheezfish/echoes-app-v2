<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Echoes</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" integrity="sha384-pmjIAcz2bAn0xukfxADbZIb3t8oRT9Sv0rvO+BR5Csr6Dhqq+nZs59P0pPKQJkEV" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" integrity="sha384-wgw+aLYNQ7dlhK47ZPK7FRACiq7ROZwgFNg0m04avm4CaXS+Z9Y7nMu8yNjBKYC+" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="map"></div>

    <div id="wordmark">echoes</div>

    <div id="user-pill">
        <div id="logged-out-view" style="display: none;">
            <button id="login-btn" class="pill-btn">Sign in</button>
        </div>
        <div id="logged-in-view" style="display: none;">
            <button id="user-pill-btn" class="pill-btn">
                <span id="user-avatar"></span>
                <span id="welcome-message"></span>
            </button>
        </div>
    </div>

    <div id="user-menu-dropdown" style="display: none;">
        <a href="achievements.html">Achievements</a>
        <a href="my-echoes.html">My Echoes</a>
        <a href="medley.html">Medley <span class="beta-tag">beta</span></a>
        <a href="settings.html">Settings</a>
        <hr class="menu-divider">
        <a href="#" id="logout-btn">Logout</a>
    </div>

    <div id="toast-container"></div>

    <div id="recording-preview">
        <h4>Review your echo</h4>
        <div id="preview-player-wrap"></div>
        <div id="preview-actions">
            <button id="preview-discard-btn">Discard</button>
            <button id="preview-post-btn">Post Echo</button>
        </div>
    </div>

    <div id="walk-banner" style="display:none">
        <span id="walk-banner-arrow"></span>
        <span id="walk-banner-dist"></span>
        <span id="walk-banner-location"></span>
        <span id="walk-banner-step"></span>
        <button id="walk-banner-next" style="display:none">Next →</button>
        <button id="walk-banner-end">End</button>
    </div>

    <button id="context-action-btn" title="Find My Location"></button>

    <div id="bottom-sheet">
        <div id="sheet-handle-area">
            <div id="sheet-handle"></div>
            <p id="sheet-summary">Explore the map</p>
        </div>
        <div id="nearby-echoes-list"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" integrity="sha384-eXVCORTRlv4FUUgS/xmOyr66XBVraen8ATNLMESp92FKXLAMiKkerixTiBvXriZr" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/leaflet.smoothwheelzoom/SmoothWheelZoom.js"></script>
    <script crossorigin="anonymous" data-clerk-publishable-key="pk_test_Z2FtZS1vcnl4LTg5LmNsZXJrLmFjY291bnRzLmRldiQ" src="https://game-oryx-89.clerk.accounts.dev/npm/@clerk/clerk-js@latest/dist/clerk.browser.js" type="text/javascript"></script>
    <script src="auth.js"></script>
    <script src="audio-player.js"></script>
    <script src="app.js"></script>
</body>
</html>
