<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Medley (beta)</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha384-sHL9NAb7lN7rfvG5lfHpm643Xkcjzp4jFvuavGOndn6pjVqS6ny56CAt3nsEVT4H" crossorigin="anonymous" />
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="medley.css">
    <link rel="manifest" href="/manifest.json">
</head>
<body>
    <div id="map"></div>

    <div id="page-back">
        <a href="index.html" class="pill-btn back-pill">← echoes</a>
    </div>
    <span id="page-nav-user" class="page-user-label"></span>

    <div id="page-title-pill" class="pill-btn page-title-pill-static">
        Medley <span class="beta-tag">beta</span>
    </div>

    <div id="toast-container"></div>

    <button id="drop-track-btn" title="Drop a Track at Your Location" disabled>
        <img src="https://api.iconify.design/material-symbols:add-location-alt-outline.svg?color=white" alt="Drop Track">
        <span>Drop a Track</span>
    </button>

    <div id="drop-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button class="close-btn">×</button>
            <h2>Drop a Track or Playlist</h2>
            <p style="color: #999; font-size: 0.875rem; margin-top: 0.25rem;">Search Spotify and leave a vibe for this location.</p>
            <div class="search-container">
                <input type="text" id="spotify-search-input" placeholder="Search for a song, artist, or playlist...">
            </div>
            <div id="spotify-results-container"></div>
            <div id="selection-preview" style="display: none;">
                <h4>Your Selection:</h4>
                <div id="selected-item-display"></div>
                <button id="confirm-drop-btn">Drop It Here</button>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha384-cxOPjt7s7Iz04uaHJceBmS+qpjv2JkIHNVcuOrM+YHwZOmJGBXI00mdUXEq65HTH" crossorigin="anonymous"></script>
    <script src="medley.js"></script>
</body>
</html>
