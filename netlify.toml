# netlify.toml

[[redirects]]
  from = "/sw.js"
  to = "/client/sw.js"
  status = 200

[[redirects]]
  from = "/manifest.json"
  to = "/client/manifest.json"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), microphone=(self), camera=()"
    Content-Security-Policy = "default-src 'self'; script-src 'self' https://unpkg.com; style-src 'self' 'unsafe-inline' https://unpkg.com; img-src 'self' data: blob: https://api.iconify.design https://api.maptiler.com https://i.scdn.co https://mosaic.scdn.co; connect-src 'self' https://echoes-server.cheezfish.com https://pub-01555d49f21d4b6ca8fa85fc6f52fb0a.r2.dev; media-src https://pub-01555d49f21d4b6ca8fa85fc6f52fb0a.r2.dev; frame-src https://open.spotify.com; worker-src 'self'; frame-ancestors 'none';"
